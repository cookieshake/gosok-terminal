<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bus body -->
  <rect x="1" y="1" width="30" height="30" rx="4" fill="#1f2937"/>
  <!-- Windshield -->
  <rect x="4" y="4" width="24" height="17" rx="2" fill="#0d9488"/>
  <!-- Prompt: > chevron -->
  <polyline points="9,9 13.5,12.5 9,16" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Prompt: _ cursor -->
  <line x1="15.5" y1="16" x2="23" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Divider strip -->
  <rect x="1" y="22" width="30" height="1.5" fill="#374151"/>
  <!-- Left headlight -->
  <rect x="3" y="24.5" width="7" height="4" rx="2" fill="#fbbf24"/>
  <!-- Right headlight -->
  <rect x="22" y="24.5" width="7" height="4" rx="2" fill="#fbbf24"/>
  <!-- Center grille -->
  <rect x="12" y="24.5" width="8" height="4" rx="1.5" fill="#374151"/>
</svg>
