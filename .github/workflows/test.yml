name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (for embed)
        run: cd frontend && npm ci && npm run build

      - name: Prepare embed directory
        run: cp -r frontend/dist cmd/gosok/dist

      - name: Run integration tests
        run: go test ./tests/integration/... -timeout 120s -v

      - name: Cleanup
        if: always()
        run: rm -rf cmd/gosok/dist

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build gosok binary
        run: |
          cp -r frontend/dist cmd/gosok/dist
          go build -o bin/gosok ./cmd/gosok/
          rm -rf cmd/gosok/dist

      - name: Install Playwright
        run: cd tests/e2e && npm ci && npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: cd tests/e2e && npx playwright test --reporter=line

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/test-results/
          retention-days: 7
