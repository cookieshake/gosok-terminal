name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Stub embed directory
        run: mkdir -p cmd/gosok/dist && touch cmd/gosok/dist/.gitkeep
      - name: go vet
        run: go vet ./...
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          args: --timeout=5m

  lint-frontend:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: ESLint
        run: cd frontend && npm run lint
      - name: TypeScript typecheck
        run: cd frontend && npx tsc --noEmit

  unit-go:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Stub embed directory
        run: mkdir -p cmd/gosok/dist && touch cmd/gosok/dist/.gitkeep
      - name: Run unit tests (excluding integration)
        run: go test $(go list ./... | grep -v -e /tests/integration -e /node_modules/) -race -timeout 60s

  integration:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (for embed)
        run: cd frontend && npm ci && npm run build

      - name: Prepare embed directory
        run: cp -r frontend/dist cmd/gosok/dist

      - name: Run integration tests
        run: go test ./tests/integration/... -timeout 120s -v

      - name: Cleanup
        if: always()
        run: rm -rf cmd/gosok/dist

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build gosok binary
        run: |
          cp -r frontend/dist cmd/gosok/dist
          go build -o bin/gosok ./cmd/gosok/
          rm -rf cmd/gosok/dist

      - name: Install Playwright
        run: cd tests/e2e && npm ci && npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: cd tests/e2e && npx playwright test --reporter=line

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/test-results/
          retention-days: 7
